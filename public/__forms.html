<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Placeholder</title>
</head>
<body>
    <!-- This form exists so Netlify detects the form definition at build time -->
    <form name="email-gate" netlify netlify-honeypot="bot-field" hidden>
        <input type="text" name="email" />
        <input type="hidden" name="form-name" value="email-gate" />
    </form>
</body>
</html>
